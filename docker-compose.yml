version: "3.9"

# TechHub Customer Support — full local stack
#
# Usage:
#   docker compose up --build          # start everything
#   docker compose up --build api      # start only the API (+ deps)
#   docker compose down -v             # stop and remove volumes
#
# First-time setup:
#   1. Copy .env.example → .env and fill in API keys
#   2. docker compose up postgres redis -d
#   3. docker compose run --rm api python data/migrations/migrate_sqlite_to_pg.py

services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: techhub
      POSTGRES_USER: techhub
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-techhub_dev}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./data/migrations/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U techhub"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build: .
    restart: unless-stopped
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://techhub:${POSTGRES_PASSWORD:-techhub_dev}@postgres:5432/techhub
      REDIS_URL: redis://redis:6379
      ALLOWED_ORIGINS: "http://localhost:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      # Mount data directory so SQLite fallback and vectorstores are accessible
      - ./data:/app/data
      # Mount source directories for hot-reload during development (no rebuild needed)
      - ./agents:/app/agents
      - ./backend:/app/backend
      - ./tools:/app/tools
      - ./evaluators:/app/evaluators
      - ./deployments:/app/deployments
      - ./config.py:/app/config.py

  # ── Next.js frontend ─────────────────────────────────────────────────────────
  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://api:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    depends_on:
      - api

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
